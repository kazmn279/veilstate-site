<Index.html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="description" content="Veil State — decode the signal and enter the Divide." />
    <title>Veil State</title>
    <style>
        :root {
            --bg-color: #000;
            --panel: rgba(0,0,0,0.6);
            --accent: #9fb;
            --muted: #ddd;
        }
        html,body{height:100%;margin:0}
        body{
            font-family: system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;
            background: var(--bg-color) url("assets/media/bg-veilstate.png") no-repeat center center fixed;
            background-size: cover;
            color: var(--muted);
            display:flex;
            align-items:center;
            justify-content:center;
            padding:1rem;
            text-align:center;
            -webkit-font-smoothing:antialiased;
            -moz-osx-font-smoothing:grayscale;
            min-height:100vh;
        }
        .card{
            background: linear-gradient(180deg, rgba(0,0,0,0.55), rgba(0,0,0,0.7));
            border: 1px solid rgba(255,255,255,0.06);
            padding:2rem;
            border-radius:12px;
            max-width:720px;
            width:100%;
            box-shadow: 0 8px 30px rgba(0,0,0,0.7);
            backdrop-filter: blur(6px);
        }
        h1{margin:0 0 .25rem;font-size:2rem;letter-spacing:.14rem}
        p{margin:.25rem 0 1rem;color:rgba(255,255,255,0.85)}
        .controls{display:flex;gap:.5rem;flex-wrap:wrap;justify-content:center}
        input[type="search"]{
            background:var(--panel);
            color:var(--muted);
            border:1px solid rgba(255,255,255,0.06);
            padding:.7rem .9rem;
            border-radius:8px;
            font-size:1rem;
            width:220px;
            outline: none;
        }
        button{
            background:transparent;
            color:var(--muted);
            border:1px solid rgba(255,255,255,0.08);
            padding:.7rem .9rem;
            border-radius:8px;
            cursor:pointer;
            transition: all .15s ease;
        }
        button.primary{
            background:linear-gradient(90deg,#1f2937 0%, #374151 100%);
            color: #fff;
            border: none;
        }
        button:hover{transform:translateY(-1px)}
        .hint{font-size:.875rem;color:rgba(255,255,255,0.6);margin-top:.75rem}
        .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
        .msg{margin-top:.75rem;min-height:1.2rem}
        @media(min-width:768px){
            h1{font-size:2.75rem}
            input[type="search"]{width:340px}
        }
    </style>
</head>
<body>
    <main class="card" role="main">
        <h1>VEIL STATE</h1>
        <p>Decode the signal. Enter the Divide.</p>

        <div class="controls" role="form" aria-labelledby="formLabel">
            <label id="formLabel" class="sr-only" for="codeInput">Cipher code</label>
            <input id="codeInput" type="search" inputmode="latin" autocomplete="off" placeholder="Enter cipher code" aria-describedby="hint" />
            <button id="unlockBtn" class="primary" type="button">Unlock</button>
            <button id="clearBtn" type="button" aria-label="Clear code">Clear</button>
        </div>

        <div id="msg" class="msg" aria-live="polite"></div>
        <div id="hint" class="hint">Codes are case-insensitive and alphanumeric.</div>
    </main>

    <noscript>
        <style> .card{opacity:0.95} </style>
        <div style="position:fixed;left:1rem;right:1rem;bottom:1rem;background:#111;padding:.6rem;border-radius:8px;color:#fff;text-align:center">
            JavaScript is required to decode the signal. Please enable JavaScript.
        </div>
    </noscript>

    <script>
        // Accessible, safe mapping-based navigation
        (function () {
            const input = document.getElementById('codeInput');
            const btn = document.getElementById('unlockBtn');
            const clear = document.getElementById('clearBtn');
            const msg = document.getElementById('msg');

            // canonical internal routes (no open redirect risk)
            const routes = {
                veil2025: '/lore/intro.html',
                factionx: '/lore/factions.html',
                freebook: '/shop/checkout.html?discount=cipherwinner'
            };

            function normalize(value) {
                // keep only letters and numbers, limit length
                return (value || '')
                    .toString()
                    .toLowerCase()
                    .replace(/[^a-z0-9]/g, '')
                    .slice(0, 32);
            }

            function showMessage(text, ok = true) {
                msg.textContent = text;
                msg.style.color = ok ? '#9fb' : '#f88';
            }

            function attemptUnlock() {
                const code = normalize(input.value.trim());
                if (!code) {
                    showMessage('Please enter a code.', false);
                    input.focus();
                    return;
                }
                if (routes.hasOwnProperty(code)) {
                    showMessage('Decoding... Redirecting...');
                    // small delay improves perceived feedback
                    setTimeout(() => {
                        // final navigation stays within same origin
                        window.location.href = routes[code];
                    }, 300);
                } else {
                    showMessage('Incorrect code. Try again.', false);
                    input.select();
                }
            }

            // events
            btn.addEventListener('click', attemptUnlock);
            clear.addEventListener('click', () => { input.value = ''; input.focus(); showMessage(''); });

            // submit on Enter
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    attemptUnlock();
                }
            });

            // auto-focus on page load (user-friendly)
            window.addEventListener('load', () => input.focus());
        })();
    </script>
</body>
</html>
